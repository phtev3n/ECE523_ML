seed: 42
device: cuda
epochs: 40
batch_size: 2
learning_rate: 0.0003
num_workers: 2
image_size: [512, 512]
sequence_length: 16
train_split: 0.8
save_path: outputs/detector_last.pt

synthetic:
  num_sequences: 2000
  fps: 60.0

model:
  backbone: resnet50
  # Larger sigma provides a wider gradient footprint for the sparse ball target,
  # helping the model learn coarse localisation before fine offset regression.
  heatmap_sigma: 5.0

loss:
  heatmap_weight: 1.0
  offset_weight: 1.0
  # Must be >0 or the visibility head never receives gradients (sigmoid stays at 0.5).
  visible_weight: 1.0
  # gt_visible_rate ~0.22 → ~4.5:1 neg/pos imbalance; up-weight the positive class.
  visible_pos_weight: 4.0
  uncertainty_weight: 0.0