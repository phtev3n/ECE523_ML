seed: 42
device: cuda
epochs: 40
batch_size: 2
learning_rate: 0.0003
num_workers: 2
image_size: [512, 512]
sequence_length: 16
train_split: 0.8
save_path: outputs/detector_best.pt

synthetic:
  num_sequences: 2000
  fps: 60.0

model:
  backbone: resnet50
  # sigma=2.0 at 1/4 scale (128px output from 512px input): a golf ball subtends
  # ~1-5px at the heatmap scale, so a 2px sigma Gaussian matches the actual target
  # size rather than smearing the loss over a 30px region (sigma=5 was too large).
  heatmap_sigma: 2.0

loss:
  heatmap_weight: 1.0
  offset_weight: 1.0
  # Must be >0 or the visibility head never receives gradients (sigmoid stays at 0.5).
  visible_weight: 1.0
  # gt_visible_rate ~0.22 → ~4.5:1 neg/pos imbalance; up-weight the positive class.
  visible_pos_weight: 4.0
  uncertainty_weight: 0.0