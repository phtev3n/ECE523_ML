seed: 42
device: cuda
epochs: 50
batch_size: 4
learning_rate: 0.0003
num_workers: 2
image_size: [256, 256]
sequence_length: 16
train_split: 0.8
save_path: outputs/detector_last.pt
synthetic:
  num_sequences: 500
  fps: 60.0
model:
  backbone: resnet50
  heatmap_sigma: 2.0
loss:
  heatmap_weight: 1.0
  offset_weight: 1.0
  uncertainty_weight: 0.05
  visible_weight: 0.5
