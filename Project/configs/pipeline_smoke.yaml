batch_size: 2
device: cuda
image_size:
- 256
- 256
kalman:
  dt: 0.0166667
  max_coast_frames: 8
  meas_var: 4.0
  process_var: 15.0
  # Gate disabled: with process_var=15 the innovation covariance S≈29 px²,
  # which causes the Mahalanobis gate to reject legitimate ball detections
  # whenever the ball moves >~16 px between frames (common at early flight).
  # The vis_init_threshold guard already prevents false-positive seeding, which
  # was the original motivation for adding the gate here.
  gate_sigma: 0.0
max_test_sequences: 20
render:
  draw_filtered: true
  # Disable raw measurements: on low-visibility frames the detector fires at
  # background regions (corners, edges), drawing errant lines across the frame.
  draw_measurements: false
  # Disable reprojected: the 3D-to-2D reproject is 10–20 px offset from the
  # actual ball due to accumulated LSTM error — it creates a confusing second
  # arc alongside the Kalman-filtered tracer.
  draw_reprojected: false
  tracer_thickness: 2
sequence_length: 12
tracking:
  visibility_threshold: 0.35
  # Minimum visibility confidence required to seed the Kalman filter.
  # Higher than vis_threshold because an incorrect seed position causes the
  # filter to coast away from the true ball; a missed seed is recoverable.
  vis_init_threshold: 0.5
  force_measurement_update: false
  motion_gate: true
