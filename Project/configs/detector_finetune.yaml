seed: 42
device: cuda
image_size: [512, 512]
# Mixed fine-tune: real frames (with augmentation) + synthetic background variety
# Real dataset expands to ~216 individual frames; 4:1 synthetic ratio adds ~864 synth frames
# Total ~1080 samples — ~4x more signal per epoch than the previous 9-sample run
epochs: 40
batch_size: 8
# Slightly higher LR than before — mixed data is more stable; still 3x lower than initial train
learning_rate: 0.0001
num_workers: 0
sequence_length: 16
train_split: 0.8
save_path: outputs/detector_finetune.pt

synthetic:
  num_sequences: 2000
  fps: 60.0

model:
  backbone: resnet50
  # Reduced from 5.0 to match actual ball size at 1/4 heatmap scale.
  heatmap_sigma: 2.0

loss:
  heatmap_weight: 1.0
  offset_weight: 1.0
  visible_weight: 1.0
  # With mixed real+synthetic the pos class is genuinely rare in some synth sequences
  visible_pos_weight: 4.0
  uncertainty_weight: 0.0
