device: cuda
image_size: [256, 256]
sequence_length: 24
max_test_sequences: 20
kalman:
  dt: 0.0166667
  process_var: 15.0
  meas_var: 4.0
  max_coast_frames: 8
render:
  tracer_thickness: 2
  draw_measurements: true
  draw_filtered: true
  draw_reprojected: true
tracking:
  visibility_threshold: 0.35
  # Set to false so the Kalman filter uses the visibility head to gate updates.
  # With force_measurement_update: true every bad detection is blindly accepted,
  # which is why rmse_2d_filtered equalled rmse_2d_measured.
  force_measurement_update: false
