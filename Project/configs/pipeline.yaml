device: cuda
image_size: [512, 512]
sequence_length: 24
max_test_sequences: 20
kalman:
  dt: 0.016667
  process_var: 500.0   # High process noise: ball decelerates; large velocity changes expected
  meas_var: 25.0       # ~5px std detector noise when finding the correct object
  max_coast_frames: 8
  # Innovation gate: rejects jumps > 5-sigma from predicted position.
  # Loose enough to track the fast early frames (ball moves 30-50px/frame at impact)
  # while still rejecting gross outliers (detector suddenly jumping to golfer body).
  gate_sigma: 5.0
render:
  tracer_thickness: 2
  draw_measurements: true
  draw_filtered: true
  draw_reprojected: true
  draw_metrics: true
tracking:
  visibility_threshold: 0.35
  force_measurement_update: false
  # Apply frame-difference motion mask to heatmap before peak decoding.
  # Suppresses detections on static scene regions (e.g. golfer standing still
  # after impact).  Disable only if camera is not static.
  motion_gate: true
