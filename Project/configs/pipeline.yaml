device: cuda
image_size: [512, 512]
sequence_length: 24
max_test_sequences: 20
kalman:
  dt: 0.016667
  process_var: 500.0   # High process noise: ball decelerates; large velocity changes expected
  meas_var: 25.0       # ~5px std detector noise when finding the correct object
  max_coast_frames: 8
  # Innovation gate: rejects jumps > 5-sigma from predicted position.
  # Loose enough to track the fast early frames (ball moves 30-50px/frame at impact)
  # while still rejecting gross outliers (detector suddenly jumping to golfer body).
  gate_sigma: 5.0
render:
  tracer_thickness: 2
  # Disable raw measurements: on low-visibility frames the detector fires at
  # background regions (corners, edges), drawing errant lines across the frame.
  draw_measurements: false
  draw_filtered: true
  # Disable reprojected: the 3D-to-2D reproject is 10–20 px offset from the
  # actual ball due to accumulated LSTM error — it creates a confusing second
  # arc alongside the Kalman-filtered tracer.
  draw_reprojected: false
  draw_metrics: true
tracking:
  visibility_threshold: 0.35
  # Minimum visibility confidence required to seed the Kalman filter.
  # Higher than vis_threshold because an incorrect seed position causes the
  # filter to coast away from the true ball; a missed seed is recoverable.
  vis_init_threshold: 0.5
  force_measurement_update: false
  # Apply frame-difference motion mask to heatmap before peak decoding.
  # Suppresses detections on static scene regions (e.g. golfer standing still
  # after impact).  Disable only if camera is not static.
  motion_gate: true
  # Gaussian blur radius (pixels) used to separate small-scale ball motion
  # from large-scale golfer body motion in the high-pass motion gate.
  # Larger = more aggressive golfer suppression; smaller = less filtering.
  # Rule of thumb: set to roughly half the expected golfer body width in pixels.
  motion_gate_blur_sigma: 8.0
