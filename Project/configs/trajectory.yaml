seed: 42
device: cuda
epochs: 30
batch_size: 4
learning_rate: 0.0003
num_workers: 0
sequence_length: 24
train_split: 0.8
save_path: outputs/trajectory_last.pt
synthetic:
  num_sequences: 2000
  fps: 60.0
model:
  hidden_size: 128
  num_layers: 2
# Gaussian noise (pixels) injected into the UV input features during training
# to simulate detector errors and close the train/inference domain gap.
detector_noise_std: 8.0
loss:
  eot_weight: 0.5
  recon3d_weight: 1.0
  below_ground_weight: 0.2